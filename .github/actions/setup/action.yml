name: Setup
description: Setup the build environment
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.13.1
        run_install: false
    - name: Install Dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
