name: Dependabot Auto-Merge (Dev Dependencies)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Auto-merge dev dependency PR
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          METADATA_JSON: ${{ toJson(steps.metadata.outputs) }}
        run: |
          echo "Dependabot metadata: $(echo "$METADATA_JSON" | jq -c .)"
          DEPENDENCY_TYPE=$(echo "$METADATA_JSON" | jq -r '.dependency-type')
          PACKAGE_ECOSYSTEM=$(echo "$METADATA_JSON" | jq -r '.package-ecosystem')
          if [ "$DEPENDENCY_TYPE" = "direct:development" ] || [ "$PACKAGE_ECOSYSTEM" = "github_actions" ]; then
            echo "Supported dependency type: $DEPENDENCY_TYPE or package ecosystem: $PACKAGE_ECOSYSTEM"
          else
            echo "Not supported dependency type: $DEPENDENCY_TYPE or package ecosystem: $PACKAGE_ECOSYSTEM"
            exit 0
          fi

          echo "Approving PR #$PR_NUMBER..."
          gh pr review "$PR_NUMBER" --approve

          echo "Adding auto-merge comment..."
          gh pr comment "$PR_NUMBER" --body "✅ **Auto-merge**: This PR meets the criteria for automatic merge (Dependabot, dev dependencies only, required checks must pass). Merging when CI completes."

          echo "Enabling auto-merge (will merge when all required checks pass)..."
          gh pr merge "$PR_NUMBER" --auto --squash
